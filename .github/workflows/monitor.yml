name: Update crash monitor

on:
  schedule:
    # 15:15 UTC: after the 8:30am and 10:00am ET data-release slots year-round
    # 21:45 UTC: after the 4:00pm ET market close year-round (incl. winter time)
    # Odd minutes chosen because GitHub delays jobs scheduled at :00/:30.
    - cron: "15 15 * * *"
    - cron: "45 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run monitor
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python monitor.py

      - name: Publish report to GitHub Pages folder
        run: |
          mkdir -p docs
          cp report.html docs/index.html
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html history.csv
          git commit -m "Update report $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "nothing to commit"
          git pull --rebase origin main
          git push
